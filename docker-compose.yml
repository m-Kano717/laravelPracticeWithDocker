# version: '3.8'

services:
  # 1. Webサーバー ＆ PHPのコンテナ設定
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  # 2. データベース（MySQL）のコンテナ設定
  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: phppractice
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - db-store:/var/lib/mysql

volumes:
  db-store: